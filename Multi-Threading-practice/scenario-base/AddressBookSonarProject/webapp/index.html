<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Address Book Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📒 Address Book Management System</h1>
            <p class="subtitle">SonarQube Integrated Application</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="totalContacts">0</span>
                <span class="stat-label">Total Contacts</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="searchStatus">Ready</span>
                <span class="stat-label">Status</span>
            </div>
        </div>

        <div class="main-content">
            <section class="card search-section">
                <h2>🔍 Search Contacts</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search by name...">
                    <button onclick="searchContacts()" class="btn btn-primary">Search</button>
                    <button onclick="loadAllContacts()" class="btn btn-secondary">Show All</button>
                </div>
            </section>

            <section class="card form-section">
                <h2 id="formTitle">➕ Add New Contact</h2>
                <form id="contactForm" onsubmit="handleFormSubmit(event)">
                    <input type="hidden" id="editMode" value="false">
                    <input type="hidden" id="contactId">

                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" required placeholder="Enter full name">
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" required placeholder="Enter phone number">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="Enter email address">
                    </div>

                    <div class="form-group">
                        <label for="address">Address</label>
                        <textarea id="address" rows="2" placeholder="Enter address"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-success" id="submitBtn">Add Contact</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
                    </div>
                </form>
            </section>

            <section class="card contacts-section">
                <h2>👥 Contacts List</h2>
                <div class="contacts-table-container">
                    <table class="contacts-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Email</th>
                                <th>Address</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="contactsTableBody">
                            <!-- Contacts will be loaded here -->
                        </tbody>
                    </table>
                </div>
                <div id="noContactsMessage" class="no-contacts" style="display: none;">
                    <p>No contacts found. Add your first contact above!</p>
                </div>
            </section>
        </div>

        <footer>
            <p>Built with ❤️ | Address Book with SonarQube Integration</p>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
</body>
</html>
